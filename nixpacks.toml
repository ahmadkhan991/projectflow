[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "cd backend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "mkdir -p backend/frontend",
  "cp -r frontend/dist backend/frontend/dist"
]

[start]
cmd = "cd backend && node src/server.js"
